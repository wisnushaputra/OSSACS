version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bcms-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bcms_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bcms-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    container_name: bcms-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/bcms_db
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    container_name: bcms-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: ./docker/worker.Dockerfile
    container_name: bcms-worker
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
